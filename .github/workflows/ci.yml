name: CI

# Decision D-2026-05-14-01 (docs/rewind_charter.md §11):
# RecoverLand validation runs as runtime QGIS scenarios under
# `scripts/validation/scenarios/`, not as pytest with mocked QGIS.
# The historical `unit-tests` and `qgis-runtime` jobs targeted a
# `tests/` tree that was removed in commit bea5792.
#
# Until the runtime scenarios are wired into CI (BL-RW-P2-12 in the
# rewind backlog), this workflow only enforces static analysis.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  static-analysis:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8
        run: flake8 . --count --statistics
