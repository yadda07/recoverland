name: CI

# Decision D-2026-05-14-01 (docs/rewind_charter.md §11):
# RecoverLand validation runs as runtime QGIS scenarios under
# `scripts/validation/scenarios/`, not as pytest with mocked QGIS.
#
# RL-E3-02: the runtime scenarios are now wired into CI via a headless
# QGIS docker matrix (LTR + latest). The headless runner is
# `scripts/validation/ci_run.py` (mirrors `scenario.run()` in the QGIS
# Python console) and exits non-zero on any FAIL.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  static-analysis:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8
        run: flake8 . --count --statistics

  qgis-runtime:
    name: QGIS runtime scenarios (${{ matrix.qgis_tag }})
    runs-on: ubuntu-latest
    container:
      image: qgis/qgis:${{ matrix.qgis_tag }}
    strategy:
      fail-fast: false
      matrix:
        # Minimum supported (3.30) + latest (4.0.x target), per RL-E3-02.
        qgis_tag: [release-3_30, latest]
    steps:
      # Check out into a `recoverland` directory so the plugin is importable
      # as the `recoverland` package by the runtime scenarios.
      - uses: actions/checkout@v6
        with:
          path: recoverland

      - name: Run runtime validation scenarios (headless)
        env:
          # Parent of the plugin dir on PYTHONPATH -> `import recoverland.*`.
          PYTHONPATH: ${{ github.workspace }}
          QT_QPA_PLATFORM: offscreen
        run: |
          xvfb-run -a python3 -m recoverland.scripts.validation.ci_run
